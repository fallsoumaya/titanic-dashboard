filebeat.inputs:
  - type: filestream
    id: titanic-app-log
    enabled: true
    paths:
      - /var/log/app/app.log

    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true
          overwrite_keys: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "http://kibana:5601"