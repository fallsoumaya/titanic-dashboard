name: CI Pipeline - Titanic Dashboard

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# (Optionnel) Pour tester Node 24 dès maintenant et éviter les warnings Node20
# GitHub indique qu'on peut forcer Node24 avec cette variable. [7](https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Tests unitaires (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer les tests
        run: |
          python -m pytest -v

  docker:
    name: Build & Push Docker Image to DockerHub
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Recommandé dans les exemples build-push-action (setup-buildx action). [6](https://github.com/docker/build-push-action)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login DockerHub avec PAT (pas de mot de passe). [2](https://github.com/docker/login-action)[3](https://docs.docker.com/security/access-tokens/)
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build + Push seulement si ce n'est pas une Pull Request (pattern CI standard). [8](https://oneuptime.com/blog/post/2026-02-20-github-actions-docker-build-push/view)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/titanic-dashboard:latest
            ${{ vars.DOCKERHUB_USERNAME }}/titanic-dashboard:1.0